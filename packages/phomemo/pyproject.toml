[project]
name = "phomemo"
version = "0.1.0"
description = "Async BLE driver library for Phomemo thermal printers"
readme = "README.md"
requires-python = ">=3.13"
license = "LGPL-3.0-or-later"
dependencies = [
    "bleak>=3.0.0",
    "pillow>=12.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/phomemo"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
    "ruff>=0.11.0",
]
