[project]
name = "phomemo-tui"
version = "0.1.0"
description = "Terminal UI for Phomemo thermal printers"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-or-later"
dependencies = [
    "phomemo",
    "textual>=3.0.0",
]

[project.scripts]
phomemo-tui = "phomemo_tui.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/phomemo_tui"]

[tool.uv.sources]
phomemo = { workspace = true }

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]
